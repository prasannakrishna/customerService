name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: scm/customer-service
  SERVICE_NAME: customer-service
  KIND_CLUSTER: dev-cluster

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: ./mvnw -q -DskipTests clean package

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Load into Kind cluster
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kind load docker-image ${{ env.IMAGE_NAME }}:latest --name ${{ env.KIND_CLUSTER }}
          kind load docker-image ${{ env.IMAGE_NAME }}:${{ github.sha }} --name ${{ env.KIND_CLUSTER }}

      - name: Deploy to Kubernetes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kubectl rollout restart deployment/${{ env.SERVICE_NAME }} -n scm-services
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n scm-services --timeout=180s
